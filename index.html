<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCCCRRRRCCCC 代币控制面板</title>
  <style>
    body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
    .container { max-width: 1300px; margin: auto; background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); overflow: hidden; }
    .header { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 30px; text-align: center; }
    .header h1 { margin: 0; font-size: 32px; letter-spacing: 4px; }
    .header p { margin: 8px 0 0; opacity: 0.9; }
    .wallet-bar { display: flex; justify-content: center; align-items: center; gap: 20px; padding: 20px; background: #e8edf2; flex-wrap: wrap; }
    .wallet-bar button { padding: 10px 24px; border: none; background: #2a5298; color: white; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .wallet-bar button:hover { background: #1e3c72; }
    .section { margin: 20px; padding: 20px; background: #f9fbfd; border-radius: 12px; border: 1px solid #dee2e6; }
    .section h2 { margin: 0 0 16px; font-size: 20px; color: #2a5298; border-left: 5px solid #2a5298; padding-left: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
    .item { display: flex; align-items: center; background: white; padding: 10px 14px; border-radius: 8px; border: 1px solid #e9ecef; }
    .label { width: 130px; font-weight: bold; color: #495057; flex-shrink: 0; }
    .value { flex: 1; color: #212529; word-break: break-all; }
    .action { flex-shrink: 0; margin-left: 10px; display: flex; gap: 6px; }
    input, select { padding: 6px 10px; border: 1px solid #ced4da; border-radius: 6px; font-size: 14px; }
    button.btn { padding: 6px 14px; background: #2a5298; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button.btn:hover { background: #1e3c72; }
    button.btn:disabled { background: #adb5bd; cursor: not-allowed; }
    .status-msg { margin: 10px 0; font-size: 14px; }
    .success { color: #198754; }
    .error { color: #dc3545; }
    hr { margin: 20px 0; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🐼 CCCC RRRR CCCC 控制面板</h1>
    <p>合约地址：<span id="contractAddr"></span> | 链ID：<span id="chainIdDisplay"></span></p>
  </div>

  <div class="wallet-bar">
    <button onclick="connectWallet()" id="connectBtn">🔌 连接钱包</button>
    <span id="walletAddress" style="font-weight:bold;"></span>
    <span id="ownerTag"></span>
    <span id="networkError" class="error"></span>
  </div>

  <div id="dashboard">
    <div class="section"><p style="text-align:center;color:#6c757d;">正在加载数据，请稍候...</p></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
// ======================= 固定配置（无需修改） =======================
const CONTRACT_ADDRESS = '0x你的合约地址'; // 请替换为实际部署的合约地址
const CHAIN_ID = 56;                       // 56=BSC主网, 97=BSC测试网
const RPC_URL = 'https://bsc-dataseed.binance.org/'; // 公共RPC，可更换
// =====================================================================

document.getElementById('contractAddr').innerText = CONTRACT_ADDRESS;
document.getElementById('chainIdDisplay').innerText = CHAIN_ID;

// 合约完整ABI（包含所有读取与写入函数）
const ABI = [
  "function name() view returns (string)",
  "function symbol() view returns (string)",
  "function decimals() view returns (uint256)",
  "function totalSupply() view returns (uint256)",
  "function balanceOf(address) view returns (uint256)",
  "function getCirculatingSupply() view returns (uint256)",
  "function owner() view returns (address)",
  "function renounced() view returns (bool)",
  "function enableMint() view returns (bool)",
  "function enablePause() view returns (bool)",
  "function enableRewardList() view returns (bool)",
  "function enableWalletLimit() view returns (bool)",
  "function pause() view returns (bool)",
  "function maxWalletAmount() view returns (uint256)",
  "function enableCooldown() view returns (bool)",
  "function cooldownTime() view returns (uint256)",
  "function globalCooldownTime() view returns (uint256)",
  "function enableOffTrade() view returns (bool)",
  "function enableKillBlock() view returns (bool)",
  "function kb() view returns (uint256)",
  "function startTradeBlock() view returns (uint256)",
  "function currency() view returns (address)",
  "function currencyIsEth() view returns (bool)",
  "function _swapRouter() view returns (address)",
  "function _mainPair() view returns (address)",
  "function fundAddress() view returns (address)",
  "function _buyFundFee() view returns (uint256)",
  "function _buyLPFee() view returns (uint256)",
  "function buy_burnFee() view returns (uint256)",
  "function _sellFundFee() view returns (uint256)",
  "function _sellLPFee() view returns (uint256)",
  "function sell_burnFee() view returns (uint256)",
  "function addLiquidityFee() view returns (uint256)",
  "function removeLiquidityFee() view returns (uint256)",
  "function enableChangeTax() view returns (bool)",
  "function enableAutoAdjust() view returns (bool)",
  "function buyThreshold() view returns (uint256)",
  "function sellThreshold() view returns (uint256)",
  "function buyFeePercent() view returns (uint256)",
  "function sellFeePercent() view returns (uint256)",
  "function enablePriceStabilize() view returns (bool)",
  "function targetPrice() view returns (uint256)",
  "function priceUpperPercent() view returns (uint256)",
  "function priceLowerPercent() view returns (uint256)",
  "function stabilizeMintPercent() view returns (uint256)",
  "function stabilizeBurnPercent() view returns (uint256)",
  "function lpBurnRate() view returns (uint256)",
  "function lpBurnFrequency() view returns (uint256)",
  "function lastLpBurnTime() view returns (uint256)",
  "function mineRate() view returns (uint256)",
  "function LPRewardCondition() view returns (uint256)",
  "function minLPHoldAmount() view returns (uint256)",
  "function minInvitorHoldAmount() view returns (uint256)",
  "function generations() view returns (uint256)",
  "function fristRate() view returns (uint256)",
  "function secondRate() view returns (uint256)",
  "function thirdRate() view returns (uint256)",
  "function leftRate() view returns (uint256)",
  "function antiSYNC() view returns (bool)",
  "function _allWhiteList(address) view returns (bool)",
  "function _feeWhiteList(address) view returns (bool)",
  "function _rewardList(address) view returns (bool)",
  "function allowedPairs(address) view returns (bool)",
  "function _swapPairList(address) view returns (bool)",
  "function _inviter(address) view returns (address)",
  "function _tokenDistributor() view returns (address)",
  "function _LPRewardDistributor() view returns (address)",
  "function lpProviders(uint256) view returns (address)",
  "function excludeLpProvider(address) view returns (bool)",
  "function _userLPAmount(address) view returns (uint256)",
  "function _lastMineLPRewardTimes(address) view returns (uint256)",
  "function _currentMineLPIndex() view returns (uint256)",
  "function _progressMineLPBlock() view returns (uint256)",
  "function _progressMineLPBlockDebt() view returns (uint256)",
  "function _mineLPRewardTimeDebt() view returns (uint256)",
  "function getBinderLength(address) view returns (uint256)",
  // 管理员写入函数
  "function setWhiteList(address[] calldata, bool)",
  "function setFeeWhiteList(address[] calldata, bool)",
  "function multi_bclist(address[] calldata, bool)",
  "function setPause(bool)",
  "function setWalletLimitEnabled(bool)",
  "function changeWalletLimit(uint256)",
  "function setTradeActive(bool)",
  "function addAllowedPair(address)",
  "function removeAllowedPair(address)",
  "function setSwapPairList(address, bool)",
  "function setFundAddress(address)",
  "function setCooldown(bool, uint256, uint256)",
  "function setPriceStabilizeParams(bool, uint256, uint256, uint256, uint256, uint256)",
  "function setAutoAdjustParams(bool, uint256, uint256, uint256, uint256)",
  "function completeCustoms(uint256[] calldata)",
  "function setChangeTaxEnabled(bool)",
  "function setMineParams(uint256, uint256, uint256)",
  "function setExcludeLPProvider(address, bool)",
  "function setLpBurnParams(uint256, uint256)",
  "function changeInviteRate(uint256[] calldata)",
  "function setAntiSYNCEnable(bool)",
  "function setkb(uint256)",
  "function mintTokens(address, uint256)",
  "function setClaims(address, uint256)",
  // Ownable相关
  "function renounceOwnership()",
  "function reclaimOwnership()",
  "function transferOwnership(address)",
  // 公开函数
  "function bindInviter(address)"
];

let provider, signer, contract, decimals, userAddress, isOwner = false;

// 初始化只读provider
provider = new ethers.providers.JsonRpcProvider(RPC_URL);
contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);

// 连接钱包
window.connectWallet = async function() {
  try {
    if (!window.ethereum) throw new Error('请安装MetaMask插件');
    await window.ethereum.request({ method: 'eth_requestAccounts' });
    const web3Provider = new ethers.providers.Web3Provider(window.ethereum);
    const network = await web3Provider.getNetwork();
    if (network.chainId !== CHAIN_ID) {
      document.getElementById('networkError').innerText = `请切换到链ID ${CHAIN_ID}`;
      return;
    }
    document.getElementById('networkError').innerText = '';
    signer = web3Provider.getSigner();
    userAddress = await signer.getAddress();
    document.getElementById('walletAddress').innerText = `已连接：${userAddress.substring(0,6)}...${userAddress.substring(38)}`;
    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    const owner = await contract.owner();
    isOwner = (owner.toLowerCase() === userAddress.toLowerCase());
    const tag = document.getElementById('ownerTag');
    if (isOwner) {
      tag.innerHTML = '<span style="color:green;font-weight:bold;">👑 管理员模式</span>';
    } else {
      tag.innerHTML = '<span style="color:#dc3545;">🔒 只读模式</span>';
    }
    await loadAllData();
  } catch (err) {
    document.getElementById('networkError').innerText = err.message;
  }
};

// 全局缓存小数位数
async function loadAllData() {
  try {
    decimals = await contract.decimals();
    // 并行读取所有状态变量
    const [
      name, symbol, totalSupply, circulating, owner, renounced,
      enableMint, enablePause, enableRewardList, enableWalletLimit, pause,
      maxWallet, enableCooldown, cooldownTime, globalCooldownTime,
      enableOffTrade, enableKillBlock, kb, startTradeBlock,
      currency, currencyIsEth, swapRouter, mainPair, fundAddress,
      buyFundFee, buyLPFee, buyBurnFee, sellFundFee, sellLPFee, sellBurnFee,
      addLiqFee, removeLiqFee, enableChangeTax,
      enableAutoAdjust, buyThreshold, sellThreshold, buyFeePercent, sellFeePercent,
      enablePriceStabilize, targetPrice, priceUpper, priceLower, stabMint, stabBurn,
      lpBurnRate, lpBurnFreq, lastLpBurn,
      mineRate, lpRewardCond, minLPHold, minInvHold,
      generations, fristRate, secondRate, thirdRate, leftRate,
      antiSYNC, tokenDist, lpRewardDist,
      currentMineLPIdx, progressMineBlock, progressDebt, mineRewardTimeDebt
    ] = await Promise.all([
      contract.name(), contract.symbol(), contract.totalSupply(), contract.getCirculatingSupply(),
      contract.owner(), contract.renounced(),
      contract.enableMint(), contract.enablePause(), contract.enableRewardList(), contract.enableWalletLimit(), contract.pause(),
      contract.maxWalletAmount(), contract.enableCooldown(), contract.cooldownTime(), contract.globalCooldownTime(),
      contract.enableOffTrade(), contract.enableKillBlock(), contract.kb(), contract.startTradeBlock(),
      contract.currency(), contract.currencyIsEth(), contract._swapRouter(), contract._mainPair(), contract.fundAddress(),
      contract._buyFundFee(), contract._buyLPFee(), contract.buy_burnFee(), contract._sellFundFee(), contract._sellLPFee(), contract.sell_burnFee(),
      contract.addLiquidityFee(), contract.removeLiquidityFee(), contract.enableChangeTax(),
      contract.enableAutoAdjust(), contract.buyThreshold(), contract.sellThreshold(), contract.buyFeePercent(), contract.sellFeePercent(),
      contract.enablePriceStabilize(), contract.targetPrice(), contract.priceUpperPercent(), contract.priceLowerPercent(), contract.stabilizeMintPercent(), contract.stabilizeBurnPercent(),
      contract.lpBurnRate(), contract.lpBurnFrequency(), contract.lastLpBurnTime(),
      contract.mineRate(), contract.LPRewardCondition(), contract.minLPHoldAmount(), contract.minInvitorHoldAmount(),
      contract.generations(), contract.fristRate(), contract.secondRate(), contract.thirdRate(), contract.leftRate(),
      contract.antiSYNC(), contract._tokenDistributor(), contract._LPRewardDistributor(),
      contract._currentMineLPIndex(), contract._progressMineLPBlock(), contract._progressMineLPBlockDebt(), contract._mineLPRewardTimeDebt()
    ]);

    // 格式化为可读字符串
    const fmt = (val, dec = decimals) => ethers.utils.formatUnits(val, dec);
    const fmt18 = (val) => ethers.utils.formatUnits(val, 18);

    const data = {
      name, symbol, decimals: decimals.toString(),
      totalSupply: fmt(totalSupply), circulating: fmt(circulating),
      owner, renounced,
      enableMint, enablePause, enableRewardList, enableWalletLimit, pause,
      maxWallet: fmt(maxWallet),
      enableCooldown, cooldownTime: cooldownTime.toString(), globalCooldownTime: globalCooldownTime.toString(),
      enableOffTrade, enableKillBlock, kb: kb.toString(), startTradeBlock: startTradeBlock.toString(),
      currency, currencyIsEth, swapRouter, mainPair, fundAddress,
      buyFundFee: buyFundFee.toString(), buyLPFee: buyLPFee.toString(), buyBurnFee: buyBurnFee.toString(),
      sellFundFee: sellFundFee.toString(), sellLPFee: sellLPFee.toString(), sellBurnFee: sellBurnFee.toString(),
      addLiqFee: addLiqFee.toString(), removeLiqFee: removeLiqFee.toString(), enableChangeTax,
      enableAutoAdjust, buyThreshold: fmt(buyThreshold), sellThreshold: fmt(sellThreshold),
      buyFeePercent: buyFeePercent.toString(), sellFeePercent: sellFeePercent.toString(),
      enablePriceStabilize, targetPrice: fmt18(targetPrice), priceUpper: priceUpper.toString(), priceLower: priceLower.toString(),
      stabMint: stabMint.toString(), stabBurn: stabBurn.toString(),
      lpBurnRate: lpBurnRate.toString(), lpBurnFreq: lpBurnFreq.toString(),
      lastLpBurn: new Date(lastLpBurn * 1000).toLocaleString(),
      mineRate: mineRate.toString(), lpRewardCond: fmt(lpRewardCond), minLPHold: fmt(minLPHold), minInvHold: fmt(minInvHold),
      generations: generations.toString(), fristRate: fristRate.toString(), secondRate: secondRate.toString(), thirdRate: thirdRate.toString(), leftRate: leftRate.toString(),
      antiSYNC, tokenDist, lpRewardDist,
      currentMineLPIdx: currentMineLPIdx.toString(), progressMineBlock: progressMineBlock.toString(),
      progressDebt: progressDebt.toString(), mineRewardTimeDebt: (mineRewardTimeDebt / 3600).toFixed(1) + ' 小时'
    };

    renderDashboard(data);
  } catch (e) {
    console.error(e);
    document.getElementById('dashboard').innerHTML = `<div class="section"><p class="error">数据加载失败：${e.message}</p></div>`;
  }
}

// ========== 渲染面板 ==========
function renderDashboard(d) {
  const isAdmin = isOwner; // 当前用户是否为管理员
  // 辅助：只读显示项
  const item = (label, value, actionHtml = '') => `
    <div class="item">
      <span class="label">${label}</span>
      <span class="value">${value}</span>
      ${actionHtml ? `<div class="action">${actionHtml}</div>` : ''}
    </div>`;

  let html = '';

  // 1. 基础信息
  html += `<div class="section"><h2>📋 基础信息</h2><div class="grid">`;
  html += item('名称', d.name);
  html += item('符号', d.symbol);
  html += item('精度', d.decimals);
  html += item('总供应量', d.totalSupply);
  html += item('流通量', d.circulating);
  html += item('合约 Owner', d.owner);
  html += item('是否已放弃', d.renounced ? '是（可恢复）' : '否');
  html += item('路由地址', d.swapRouter);
  html += item('交易代币', d.currency + (d.currencyIsEth ? ' (原生币)' : ''));
  html += item('底池对地址', d.mainPair);
  html += item('基金地址', d.fundAddress);
  html += `</div></div>`;

  // 2. 开关状态
  html += `<div class="section"><h2>🔧 全局开关</h2><div class="grid">`;
  html += item('增发开关', d.enableMint ? '✅ 开启' : '❌ 关闭');
  html += item('暂停功能', d.enablePause ? '可用' : '禁用');
  html += item('当前暂停', d.pause ? '⏸ 已暂停' : '▶ 运行中', isAdmin ? btn('切换暂停', () => execTx('setPause', !d.pause)) : '');
  html += item('奖励黑名单功能', d.enableRewardList ? '可用' : '禁用');
  html += item('钱包限制功能', d.enableWalletLimit ? '可用' : '禁用');
  html += item('冷却机制', d.enableCooldown ? '🕒 开启' : '关闭');
  html += item('开盘控制', d.enableOffTrade ? '未开盘' : '自由交易');
  html += item('杀区块', d.enableKillBlock ? '启用' : '禁用');
  html += item('允许改税', d.enableChangeTax ? '允许' : '禁止');
  html += item('阈值自动调整', d.enableAutoAdjust ? '⚡ 活跃' : '关闭');
  html += item('价格稳定', d.enablePriceStabilize ? '⚖️ 活跃' : '关闭');
  html += item('防同步', d.antiSYNC ? '开启' : '关闭', isAdmin ? btn('切换', () => execTx('setAntiSYNCEnable', !d.antiSYNC)) : '');
  html += `</div></div>`;

  // 3. 安全与限制
  html += `<div class="section"><h2>🛡 安全与限制</h2><div class="grid">`;
  html += item('最大持币量', d.maxWallet + ' ' + d.symbol, isAdmin ? inputBtn('新最大持币', 'maxWalletInput', '修改', () => {
    const val = document.getElementById('maxWalletInput').value;
    execTx('changeWalletLimit', ethers.utils.parseUnits(val, decimals));
  }) : '');
  html += item('个人冷却(秒)', d.cooldownTime);
  html += item('全局冷却(秒)', d.globalCooldownTime);
  html += item('冷却机制开关', d.enableCooldown ? '开' : '关', isAdmin ? `
    <input id="cooldownEnable" type="checkbox" ${d.enableCooldown?'checked':''}> 
    <input id="cooldownSingle" placeholder="个人秒" class="small"> 
    <input id="cooldownGlobal" placeholder="全局秒" class="small">
    <button class="btn" onclick="setCooldown()">更新</button>` : '');
  html += item('杀区块数量', d.kb + ' 块', isAdmin ? inputBtn('新区块数', 'kbInput', '修改', () => {
    const val = document.getElementById('kbInput').value;
    execTx('setkb', val);
  }) : '');
  html += item('开盘状态', d.startTradeBlock === '0' ? '未开盘' : `已开于区块 ${d.startTradeBlock}`, isAdmin ? btn(d.startTradeBlock==='0'?'开盘':'关闭', () => execTx('setTradeActive', d.startTradeBlock==='0')) : '');
  html += `</div></div>`;

  // 4. 手续费率
  html += `<div class="section"><h2>💰 手续费率（基点，1% = 100）</h2><div class="grid">`;
  html += item('买入-基金', d.buyFundFee);
  html += item('买入-LP', d.buyLPFee);
  html += item('买入-销毁', d.buyBurnFee);
  html += item('卖出-基金', d.sellFundFee);
  html += item('卖出-LP', d.sellLPFee);
  html += item('卖出-销毁', d.sellBurnFee);
  html += item('添加流动性', d.addLiqFee);
  html += item('移除流动性', d.removeLiqFee);
  if (isAdmin) {
    html += item('修改全部费率', '', `<input id="taxesInput" placeholder="8个数字,逗号分隔" style="width:200px;"> <button class="btn" onclick="execCompleteCustoms()">提交</button>`);
  }
  html += `</div></div>`;

  // 5. 阈值调整
  html += `<div class="section"><h2>📈 阈值自动调整</h2><div class="grid">`;
  html += item('买入阈值', d.buyThreshold + ' ' + d.symbol);
  html += item('卖出阈值', d.sellThreshold + ' ' + d.symbol);
  html += item('买入增发率(基点)', d.buyFeePercent);
  html += item('卖出转奖励率(基点)', d.sellFeePercent);
  if (isAdmin) {
    html += item('修改阈值参数', '', `
      <input id="autoEnable" type="checkbox" ${d.enableAutoAdjust?'checked':''}>启用
      <input id="buyThres" placeholder="买入阈值" class="small">
      <input id="sellThres" placeholder="卖出阈值" class="small">
      <input id="buyFeePer" placeholder="买入增发率" class="small">
      <input id="sellFeePer" placeholder="卖出奖励率" class="small">
      <button class="btn" onclick="setAutoAdjust()">应用</button>`);
  }
  html += `</div></div>`;

  // 6. 价格稳定
  html += `<div class="section"><h2>⚖️ 价格稳定机制</h2><div class="grid">`;
  html += item('目标价格', d.targetPrice + ' (计价币/代币)');
  html += item('上限百分比', d.priceUpper + '%');
  html += item('下限百分比', d.priceLower + '%');
  html += item('增发比例(基点)', d.stabMint);
  html += item('转奖励池比例(基点)', d.stabBurn);
  if (isAdmin) {
    html += item('修改稳定参数', '', `
      <input id="stabEnable" type="checkbox" ${d.enablePriceStabilize?'checked':''}>启用
      <input id="targetPriceInput" placeholder="目标价(小数)" class="small">
      <input id="upperInput" placeholder="上限%基点" class="small">
      <input id="lowerInput" placeholder="下限%基点" class="small">
      <input id="mintPerc" placeholder="增发基点" class="small">
      <input id="rewardPerc" placeholder="转奖励池基点" class="small">
      <button class="btn" onclick="setStabilize()">应用</button>`);
  }
  html += `</div></div>`;

  // 7. LP燃烧
  html += `<div class="section"><h2>🔥 LP底池燃烧</h2><div class="grid">`;
  html += item('燃烧速率(基点)', d.lpBurnRate);
  html += item('燃烧频率(秒)', d.lpBurnFreq);
  html += item('上次燃烧时间', d.lastLpBurn);
  if (isAdmin) {
    html += item('修改参数', '', `<input id="burnRate" placeholder="速率" class="small"> <input id="burnFreq" placeholder="频率(秒)" class="small"> <button class="btn" onclick="setLpBurn()">应用</button>`);
  }
  html += `</div></div>`;

  // 8. LP挖矿与邀请
  html += `<div class="section"><h2>⛏ LP挖矿与推荐奖励</h2><div class="grid">`;
  html += item('挖矿总比例(%)', d.mineRate);
  html += item('单次奖励量', d.lpRewardCond + ' ' + d.symbol);
  html += item('最低LP持有', d.minLPHold + ' ' + d.symbol);
  html += item('最低邀请人持有', d.minInvHold + ' ' + d.symbol);
  html += item('推荐代数', d.generations);
  html += item('一代比例(%)', d.fristRate);
  html += item('二代比例(%)', d.secondRate);
  html += item('三代比例(%)', d.thirdRate);
  html += item('后续代数比例(%)', d.leftRate);
  html += item('奖励分发合约', d.lpRewardDist);
  html += item('代币分发合约', d.tokenDist);
  html += item('当前挖矿索引', d.currentMineLPIdx);
  html += item('挖矿进度块', d.progressMineBlock);
  html += item('挖矿块间隔', d.progressDebt);
  html += item('挖矿时间间隔', d.mineRewardTimeDebt);
  if (isAdmin) {
    html += item('修改挖矿参数', '', `<input id="condInput" placeholder="单次奖励量" class="small"> <input id="minLpInput" placeholder="最小LP" class="small"> <input id="minInvInput" placeholder="最小邀请人持有" class="small"> <button class="btn" onclick="setMine()">应用</button>`);
    html += item('修改邀请比例', '', `<input id="invGen" placeholder="代数" class="small"> <input id="inv1" placeholder="一代%" class="small"> <input id="inv2" placeholder="二代%" class="small"> <input id="inv3" placeholder="三代%" class="small"> <input id="invRest" placeholder="后续%" class="small"> <button class="btn" onclick="changeInvite()">应用</button>`);
  }
  html += `</div></div>`;

  // 9. 白名单/黑名单管理
  html += `<div class="section"><h2>📌 地址权限管理</h2>`;
  html += `<div class="grid">`;
  html += item('查询某地址状态', '', `<input id="queryAddr" placeholder="0x..." style="width:300px;"> <button class="btn" onclick="queryAddress()">查询</button><div id="queryResult" style="grid-column:1/-1;margin-top:6px;"></div>`);
  if (isAdmin) {
    html += item('全功能白名单', '', `<input id="allWhiteAddrs" placeholder="地址1,地址2" style="width:240px;"> <select id="allWhiteStatus"><option value="true">添加</option><option value="false">移除</option></select> <button class="btn" onclick="execSetWhiteList()">执行</button>`);
    html += item('手续费白名单', '', `<input id="feeWhiteAddrs" placeholder="地址1,地址2" style="width:240px;"> <select id="feeWhiteStatus"><option value="true">添加</option><option value="false">移除</option></select> <button class="btn" onclick="execSetFeeWhiteList()">执行</button>`);
    html += item('奖励黑名单', '', `<input id="blackAddrs" placeholder="地址1,地址2" style="width:240px;"> <select id="blackStatus"><option value="true">加入</option><option value="false">移除</option></select> <button class="btn" onclick="execMultiBclist()">执行</button>`);
    html += item('交易对白名单', '', `<input id="pairAddr" placeholder="交易对地址" style="width:240px;"> <button class="btn" onclick="execTx('addAllowedPair')">添加</button> <button class="btn" onclick="execTx('removeAllowedPair')">移除</button>`);
    html += item('swapPairList', '', `<input id="swapPairAddr" placeholder="地址" style="width:240px;"> <select id="swapPairStatus"><option value="true">启用</option><option value="false">禁用</option></select> <button class="btn" onclick="execSetSwapPair()">执行</button>`);
  }
  html += `</div></div>`;

  // 10. 特殊操作
  html += `<div class="section"><h2>🛠 高级管理</h2><div class="grid">`;
  if (isAdmin) {
    html += item('增发代币', '', `<input id="mintTo" placeholder="接收地址" style="width:240px;"> <input id="mintAmount" placeholder="数量" class="small"> <button class="btn" onclick="execMint()">增发</button>`);
    html += item('提领代币/ETH', '', `<input id="claimToken" placeholder="代币地址(空=ETH)" style="width:240px;"> <input id="claimAmount" placeholder="数量" class="small"> <button class="btn" onclick="execClaim()">提领</button>`);
    html += item('转移所有权', '', `<input id="newOwner" placeholder="新Owner地址" style="width:240px;"> <button class="btn" onclick="execTx('transferOwnership')">转移</button>`);
    html += item('放弃/恢复所有权', '', `
      ${d.renounced 
        ? '<button class="btn" onclick="execTx(\'reclaimOwnership\')">恢复所有权</button>' 
        : '<button class="btn" onclick="execTx(\'renounceOwnership\')">放弃所有权</button>'}`);
  }
  html += item('绑定邀请人', '', `<input id="bindInviterAddr" placeholder="邀请人地址" style="width:240px;"> <button class="btn" onclick="execBindInviter()">绑定</button> (公开)`)
  html += `</div></div>`;

  document.getElementById('dashboard').innerHTML = html;
}

// 工具：生成按钮HTML
function btn(text, onClick) {
  return `<button class="btn" onclick="(${onClick.toString()})()">${text}</button>`;
}
function inputBtn(placeholder, inputId, btnText, handler) {
  return `<input id="${inputId}" placeholder="${placeholder}" class="small"> <button class="btn" onclick="(${handler.toString()})()">${btnText}</button>`;
}

// ========== 执行交易辅助 ==========
async function execTx(type, arg) {
  if (!isOwner && type !== 'bindInviter') return alert('仅管理员可操作');
  try {
    let tx;
    switch (type) {
      case 'setPause': tx = await contract.setPause(arg); break;
      case 'setAntiSYNCEnable': tx = await contract.setAntiSYNCEnable(arg); break;
      case 'changeWalletLimit': tx = await contract.changeWalletLimit(arg); break;
      case 'setkb': tx = await contract.setkb(arg); break;
      case 'setTradeActive': tx = await contract.setTradeActive(arg); break;
      case 'addAllowedPair': {
        const addr = document.getElementById('pairAddr').value;
        tx = await contract.addAllowedPair(addr);
        break;
      }
      case 'removeAllowedPair': {
        const addr = document.getElementById('pairAddr').value;
        tx = await contract.removeAllowedPair(addr);
        break;
      }
      case 'renounceOwnership': tx = await contract.renounceOwnership(); break;
      case 'reclaimOwnership': tx = await contract.reclaimOwnership(); break;
      case 'transferOwnership': {
        const newOwner = document.getElementById('newOwner').value;
        tx = await contract.transferOwnership(newOwner);
        break;
      }
      default: return alert('未知操作');
    }
    await tx.wait();
    alert('交易成功！');
    await loadAllData();
  } catch (e) {
    alert('交易失败: ' + e.message);
  }
}

// 查询地址状态
async function queryAddress() {
  const addr = document.getElementById('queryAddr').value.trim();
  if (!ethers.utils.isAddress(addr)) return alert('无效地址');
  try {
    const [allWhite, feeWhite, reward, allowedPair, balance] = await Promise.all([
      contract._allWhiteList(addr),
      contract._feeWhiteList(addr),
      contract._rewardList(addr),
      contract.allowedPairs(addr),
      contract.balanceOf(addr)
    ]);
    document.getElementById('queryResult').innerHTML = `
      <b>余额：</b>${ethers.utils.formatUnits(balance, decimals)} ${await contract.symbol()} &nbsp;
      <b>全白：</b>${allWhite?'是':'否'} &nbsp;
      <b>费白：</b>${feeWhite?'是':'否'} &nbsp;
      <b>奖励黑名单：</b>${reward?'是':'否'} &nbsp;
      <b>允许交易对：</b>${allowedPair?'是':'否'}
    `;
  } catch (e) { alert('查询失败: ' + e.message); }
}
